<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>CS2 Predictor</title>
<script src="https://telegram.org/js/telegram-web-app.js"></script>
<style>
:root {
  --bg: #0d1117;
  --card: #161b22;
  --card2: #1c2128;
  --border: #30363d;
  --accent: #ff6b35;
  --accent-glow: rgba(255,107,53,0.15);
  --gold: #ffd700;
  --text: #e6edf3;
  --sub: #8b949e;
  --green: #3fb950;
  --red: #f85149;
  --blue: #58a6ff;
  --radius: 12px;
}
* { margin:0; padding:0; box-sizing:border-box; -webkit-tap-highlight-color:transparent; }
html, body { height:100%; overflow:hidden; }
body {
  background: var(--bg);
  color: var(--text);
  font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
  font-size: 14px;
  overscroll-behavior: none;
}

/* LAYOUT */
#root { display:flex; flex-direction:column; height:100vh; }
.header {
  background: var(--card);
  border-bottom: 1px solid var(--border);
  padding: 12px 16px;
  display: flex; align-items:center; justify-content:space-between;
  flex-shrink: 0;
  z-index: 50;
}
.header-logo { display:flex; align-items:center; gap:8px; }
.logo-icon { font-size:22px; }
.logo-text { font-size:17px; font-weight:700; color:var(--accent); letter-spacing:.5px; }
.header-badge { font-size:10px; font-weight:600; padding:3px 8px; border-radius:20px; }
.badge-active { background:rgba(63,185,80,.15); color:var(--green); border:1px solid rgba(63,185,80,.3); }
.badge-inactive { background:rgba(248,81,73,.12); color:var(--red); border:1px solid rgba(248,81,73,.3); }

.content { flex:1; overflow-y:auto; overflow-x:hidden; -webkit-overflow-scrolling:touch; }

/* SCREENS */
.screen { display:none; animation: fadeIn .2s ease; }
.screen.active { display:block; }
@keyframes fadeIn { from{opacity:0;transform:translateY(8px)} to{opacity:1;transform:none} }

/* ANALYSIS OVERLAY */
#analysis-overlay {
  position:fixed; inset:0; background:var(--bg); z-index:200;
  display:none; flex-direction:column; overflow:hidden;
}
#analysis-overlay.open { display:flex; }

/* BOTTOM NAV */
.bottom-nav {
  background:var(--card); border-top:1px solid var(--border);
  display:flex; flex-shrink:0; z-index:50;
}
.nav-tab {
  flex:1; display:flex; flex-direction:column; align-items:center;
  padding:8px 4px 10px; gap:3px; cursor:pointer;
  color:var(--sub); font-size:10px; font-weight:500;
  transition:color .15s; user-select:none;
}
.nav-tab.active { color:var(--accent); }
.nav-tab svg { width:22px; height:22px; stroke:currentColor; stroke-width:1.8; fill:none; stroke-linecap:round; stroke-linejoin:round; }

/* MATCH CARDS */
.matches-list { padding:8px 0 16px; }
.section-header { padding:14px 16px 8px; font-size:11px; font-weight:600; color:var(--sub); text-transform:uppercase; letter-spacing:.8px; }

.match-card {
  background:var(--card); border:1px solid var(--border);
  border-radius:var(--radius); margin:6px 12px;
  padding:14px; cursor:pointer;
  transition:border-color .15s, background .15s;
  position:relative; overflow:hidden;
}
.match-card:active { background:var(--card2); border-color:var(--accent); }
.match-card-live { border-color:rgba(248,81,73,.4); }
.match-card::before { content:''; position:absolute; left:0; top:0; bottom:0; width:3px; background:var(--border); border-radius:3px 0 0 3px; }
.match-card-live::before { background:var(--red); }
.match-card-hot::before { background:var(--accent); }

.match-meta { display:flex; align-items:center; gap:6px; margin-bottom:10px; }
.match-live { background:var(--red); color:#fff; font-size:9px; font-weight:700; padding:2px 6px; border-radius:4px; letter-spacing:.5px; }
.match-time { color:var(--sub); font-size:12px; }
.match-format { color:var(--blue); font-size:11px; font-weight:600; }
.match-event { color:var(--sub); font-size:11px; margin-left:auto; max-width:120px; text-align:right; white-space:nowrap; overflow:hidden; text-overflow:ellipsis; }
.match-stars { color:var(--gold); font-size:11px; }

.match-teams { display:flex; align-items:center; justify-content:space-between; gap:8px; }
.team-name { font-size:15px; font-weight:700; flex:1; }
.team-name.right { text-align:right; }
.vs-badge { background:var(--card2); border:1px solid var(--border); border-radius:6px; padding:3px 8px; font-size:11px; font-weight:600; color:var(--sub); flex-shrink:0; }

/* LOADING */
.loader { display:flex; flex-direction:column; align-items:center; justify-content:center; padding:60px 20px; gap:16px; }
.spinner { width:36px; height:36px; border:3px solid var(--border); border-top-color:var(--accent); border-radius:50%; animation:spin .7s linear infinite; }
@keyframes spin { to { transform:rotate(360deg); } }
.loader-text { color:var(--sub); font-size:13px; }

.empty-state { text-align:center; padding:60px 20px; color:var(--sub); }
.empty-icon { font-size:48px; margin-bottom:12px; }

/* ANALYSIS */
.analysis-header { background:var(--card); border-bottom:1px solid var(--border); padding:12px 16px; flex-shrink:0; }
.analysis-back { display:flex; align-items:center; gap:8px; cursor:pointer; color:var(--accent); font-size:14px; font-weight:500; margin-bottom:10px; }
.analysis-back svg { width:18px; height:18px; stroke:currentColor; stroke-width:2; fill:none; stroke-linecap:round; stroke-linejoin:round; }
.analysis-teams { display:flex; align-items:center; justify-content:space-between; gap:12px; }
.a-team { flex:1; }
.a-team-name { font-size:16px; font-weight:700; }
.a-team-sub { font-size:11px; color:var(--sub); margin-top:2px; }
.a-team.right { text-align:right; }
.a-vs { text-align:center; }
.a-vs-text { font-size:13px; font-weight:700; color:var(--sub); }
.a-event { font-size:11px; color:var(--sub); white-space:nowrap; }

.analysis-body { flex:1; overflow-y:auto; -webkit-overflow-scrolling:touch; }

/* WIN BAR */
.win-section { padding:16px; }
.win-label { font-size:11px; color:var(--sub); margin-bottom:10px; font-weight:600; text-transform:uppercase; letter-spacing:.5px; }
.win-teams-row { display:flex; justify-content:space-between; margin-bottom:6px; }
.win-team-name { font-size:13px; font-weight:600; }
.win-pct { font-size:20px; font-weight:800; }
.win-pct.t1 { color:var(--blue); }
.win-pct.t2 { color:var(--accent); }
.win-bar-track { background:var(--card2); border-radius:8px; height:10px; overflow:hidden; position:relative; }
.win-bar-fill { height:100%; border-radius:8px; transition:width .8s ease; }
.verdict-box { background:var(--accent-glow); border:1px solid rgba(255,107,53,.2); border-radius:8px; padding:10px 14px; margin-top:12px; font-size:13px; line-height:1.4; }
.verdict-winner { font-weight:700; color:var(--accent); }

/* TABS */
.tabs { display:flex; border-bottom:1px solid var(--border); background:var(--card); flex-shrink:0; }
.tab-btn { flex:1; padding:10px 4px; font-size:12px; font-weight:600; color:var(--sub); cursor:pointer; text-align:center; border-bottom:2px solid transparent; transition:color .15s, border-color .15s; }
.tab-btn.active { color:var(--accent); border-bottom-color:var(--accent); }
.tab-content { display:none; }
.tab-content.active { display:block; }

/* STATS SECTION */
.stats-section { padding:0 16px 12px; }
.stats-card { background:var(--card); border:1px solid var(--border); border-radius:var(--radius); overflow:hidden; margin-bottom:10px; }
.stats-card-header { padding:10px 14px; background:var(--card2); font-size:12px; font-weight:700; color:var(--sub); text-transform:uppercase; letter-spacing:.5px; border-bottom:1px solid var(--border); }
.stats-row { display:flex; justify-content:space-between; align-items:center; padding:9px 14px; border-bottom:1px solid var(--border); }
.stats-row:last-child { border-bottom:none; }
.stats-label { color:var(--sub); font-size:12px; }
.stats-value { font-weight:600; font-size:13px; }
.stats-value.good { color:var(--green); }
.stats-value.ok { color:var(--blue); }
.stats-value.bad { color:var(--red); }

/* H2H */
.h2h-row { display:flex; align-items:center; justify-content:center; gap:24px; padding:14px; }
.h2h-item { text-align:center; }
.h2h-wins { font-size:28px; font-weight:800; }
.h2h-team { font-size:11px; color:var(--sub); margin-top:2px; }
.h2h-matches { padding:0 14px 12px; }
.h2h-match { display:flex; justify-content:space-between; align-items:center; padding:6px 0; border-bottom:1px solid var(--border); font-size:12px; }
.h2h-match:last-child { border:none; }
.h2h-winner { font-weight:600; color:var(--green); }

/* KEY FACTORS */
.factors-list { padding:0 16px 12px; }
.factor-item { display:flex; gap:10px; padding:10px 14px; background:var(--card); border:1px solid var(--border); border-radius:8px; margin-bottom:6px; font-size:13px; line-height:1.4; }
.factor-bullet { color:var(--accent); flex-shrink:0; margin-top:1px; }

/* SUMMARY */
.summary-box { margin:0 16px 12px; padding:12px 14px; background:var(--card); border:1px solid var(--border); border-radius:var(--radius); font-size:13px; line-height:1.5; color:var(--sub); font-style:italic; }

/* PLAYERS */
.player-card {
  background:var(--card); border:1px solid var(--border);
  border-radius:var(--radius); margin:6px 12px;
  padding:12px 14px;
  display:flex; align-items:flex-start; gap:12px;
}
.player-card.star { border-color:rgba(255,215,0,.3); background:rgba(255,215,0,.03); }
.player-avatar { width:40px; height:40px; border-radius:10px; background:var(--card2); display:flex; align-items:center; justify-content:center; font-size:18px; flex-shrink:0; }
.player-info { flex:1; min-width:0; }
.player-name { font-size:15px; font-weight:700; display:flex; align-items:center; gap:6px; }
.player-role { font-size:11px; color:var(--sub); margin-top:2px; }
.player-stats { display:flex; gap:16px; margin-top:8px; flex-wrap:wrap; }
.player-stat { display:flex; flex-direction:column; gap:2px; }
.player-stat-val { font-size:14px; font-weight:700; }
.player-stat-label { font-size:10px; color:var(--sub); }
.player-note { font-size:12px; color:var(--sub); margin-top:8px; line-height:1.4; }
.form-tag { font-size:10px; font-weight:700; padding:2px 6px; border-radius:4px; }
.form-hot { background:rgba(255,107,53,.15); color:var(--accent); }
.form-good { background:rgba(63,185,80,.12); color:var(--green); }
.form-avg { background:rgba(88,166,255,.1); color:var(--blue); }
.form-weak { background:rgba(139,148,158,.1); color:var(--sub); }

/* MAPS SECTION */
.maps-section { padding:0 12px 12px; }
.map-item { padding:8px 14px; background:var(--card); border:1px solid var(--border); border-radius:8px; margin-bottom:6px; font-size:13px; line-height:1.4; }
.map-item.green { border-left:3px solid var(--green); }
.map-item.red { border-left:3px solid var(--red); }
.map-item.gray { border-left:3px solid var(--border); }

/* TOP TEAMS */
.teams-list { padding:8px 12px 16px; }
.team-row { display:flex; align-items:center; gap:12px; padding:12px 14px; background:var(--card); border:1px solid var(--border); border-radius:var(--radius); margin-bottom:6px; }
.team-rank { font-size:16px; font-weight:800; width:32px; text-align:center; }
.team-info { flex:1; }
.team-row-name { font-size:14px; font-weight:600; }
.team-flag { font-size:20px; }
.rank-medal-1 { color:var(--gold); }
.rank-medal-2 { color:#c0c0c0; }
.rank-medal-3 { color:#cd7f32; }

/* PROFILE */
.profile-card { background:var(--card); border:1px solid var(--border); border-radius:var(--radius); margin:12px; padding:16px; }
.profile-user { display:flex; align-items:center; gap:12px; margin-bottom:16px; }
.profile-avatar { width:52px; height:52px; border-radius:50%; background:linear-gradient(135deg, var(--accent), #ff4500); display:flex; align-items:center; justify-content:center; font-size:22px; font-weight:700; color:#fff; }
.profile-name { font-size:16px; font-weight:700; }
.profile-id { font-size:12px; color:var(--sub); margin-top:2px; }

.sub-status { text-align:center; padding:20px; }
.sub-icon { font-size:48px; margin-bottom:8px; }
.sub-title { font-size:17px; font-weight:700; margin-bottom:6px; }
.sub-desc { font-size:13px; color:var(--sub); line-height:1.5; }
.sub-days { font-size:32px; font-weight:800; color:var(--green); margin:8px 0 2px; }
.sub-expires { font-size:12px; color:var(--sub); }

.activate-form { padding:0 12px 16px; }
.input-label { font-size:12px; color:var(--sub); margin-bottom:6px; font-weight:500; }
.code-input { width:100%; background:var(--card); border:1px solid var(--border); border-radius:8px; padding:12px 14px; color:var(--text); font-size:15px; font-weight:600; letter-spacing:1px; text-transform:uppercase; outline:none; transition:border-color .15s; }
.code-input:focus { border-color:var(--accent); }
.code-input::placeholder { letter-spacing:0; font-weight:400; text-transform:none; }
.btn-activate { width:100%; margin-top:10px; padding:13px; background:var(--accent); color:#fff; border:none; border-radius:8px; font-size:15px; font-weight:700; cursor:pointer; transition:opacity .15s; }
.btn-activate:active { opacity:.85; }
.btn-activate:disabled { opacity:.5; cursor:not-allowed; }

.toast { position:fixed; bottom:80px; left:50%; transform:translateX(-50%); background:#333; color:#fff; padding:10px 20px; border-radius:8px; font-size:13px; font-weight:500; z-index:500; animation:toastIn .25s ease; white-space:nowrap; }
.toast.success { background:var(--green); }
.toast.error { background:var(--red); }
@keyframes toastIn { from{opacity:0;transform:translateX(-50%) translateY(10px)} to{opacity:1;transform:translateX(-50%) translateY(0)} }
</style>
</head>
<body>
<div id="root">
  <!-- HEADER -->
  <div class="header">
    <div class="header-logo">
      <span class="logo-icon">🎯</span>
      <span class="logo-text">CS2 PREDICTOR</span>
    </div>
    <span class="header-badge badge-inactive" id="sub-badge">🔒 Нет доступа</span>
  </div>

  <!-- CONTENT -->
  <div class="content" id="main-content">
    <!-- MATCHES -->
    <div class="screen active" id="screen-matches">
      <div class="loader" id="matches-loader">
        <div class="spinner"></div>
        <div class="loader-text">Загружаю матчи...</div>
      </div>
      <div class="matches-list" id="matches-list" style="display:none"></div>
    </div>

    <!-- TOP TEAMS -->
    <div class="screen" id="screen-top">
      <div class="loader" id="top-loader">
        <div class="spinner"></div>
        <div class="loader-text">Загружаю рейтинг...</div>
      </div>
      <div class="teams-list" id="teams-list" style="display:none"></div>
    </div>

    <!-- PROFILE -->
    <div class="screen" id="screen-profile">
      <div class="profile-card">
        <div class="profile-user">
          <div class="profile-avatar" id="profile-avatar">?</div>
          <div>
            <div class="profile-name" id="profile-name">Загрузка...</div>
            <div class="profile-id" id="profile-id">ID: —</div>
          </div>
        </div>
        <div class="sub-status" id="sub-status-block">
          <div class="loader"><div class="spinner"></div></div>
        </div>
      </div>
      <div class="activate-form">
        <div class="input-label">КОД АКТИВАЦИИ</div>
        <input class="code-input" id="code-input" type="text" placeholder="Введи код доступа" maxlength="30">
        <button class="btn-activate" id="btn-activate" onclick="activateCode()">Активировать</button>
      </div>
    </div>
  </div>

  <!-- BOTTOM NAV -->
  <div class="bottom-nav">
    <div class="nav-tab active" id="nav-matches" onclick="switchTab('matches')">
      <svg viewBox="0 0 24 24"><rect x="3" y="3" width="7" height="7" rx="1"/><rect x="14" y="3" width="7" height="7" rx="1"/><rect x="3" y="14" width="7" height="7" rx="1"/><rect x="14" y="14" width="7" height="7" rx="1"/></svg>
      Матчи
    </div>
    <div class="nav-tab" id="nav-top" onclick="switchTab('top')">
      <svg viewBox="0 0 24 24"><path d="M12 2l3.09 6.26L22 9.27l-5 4.87 1.18 6.88L12 17.77l-6.18 3.25L7 14.14 2 9.27l6.91-1.01L12 2z"/></svg>
      Топ
    </div>
    <div class="nav-tab" id="nav-profile" onclick="switchTab('profile')">
      <svg viewBox="0 0 24 24"><path d="M20 21v-2a4 4 0 00-4-4H8a4 4 0 00-4 4v2"/><circle cx="12" cy="7" r="4"/></svg>
      Профиль
    </div>
  </div>
</div>

<!-- ANALYSIS OVERLAY -->
<div id="analysis-overlay">
  <div class="analysis-header">
    <div class="analysis-back" onclick="closeAnalysis()">
      <svg viewBox="0 0 24 24"><polyline points="15 18 9 12 15 6"/></svg>
      Назад к матчам
    </div>
    <div class="analysis-teams">
      <div class="a-team">
        <div class="a-team-name" id="a-t1-name">—</div>
        <div class="a-team-sub" id="a-t1-sub"></div>
      </div>
      <div class="a-vs">
        <div class="a-vs-text">VS</div>
        <div class="a-event" id="a-event"></div>
      </div>
      <div class="a-team right">
        <div class="a-team-name" id="a-t2-name">—</div>
        <div class="a-team-sub" id="a-t2-sub"></div>
      </div>
    </div>
  </div>

  <!-- Analysis loading -->
  <div id="analysis-loader" class="analysis-body">
    <div class="loader" style="padding-top:80px">
      <div class="spinner"></div>
      <div class="loader-text">Анализирую матч...</div>
      <div class="loader-text" style="font-size:11px;margin-top:4px">Загружаю статистику и AI анализ</div>
    </div>
  </div>

  <!-- Analysis content -->
  <div id="analysis-content" style="display:none;flex-direction:column;flex:1;overflow:hidden">
    <!-- Win probability -->
    <div class="win-section">
      <div class="win-label">Шансы на победу</div>
      <div class="win-teams-row">
        <div>
          <div class="win-team-name" id="win-t1-name"></div>
          <div class="win-pct t1" id="win-p1">—%</div>
        </div>
        <div style="text-align:right">
          <div class="win-team-name" id="win-t2-name"></div>
          <div class="win-pct t2" id="win-p2">—%</div>
        </div>
      </div>
      <div class="win-bar-track">
        <div class="win-bar-fill" id="win-bar" style="width:50%;background:linear-gradient(90deg,var(--blue),var(--accent))"></div>
      </div>
      <div class="verdict-box" id="verdict-box" style="display:none">
        <span class="verdict-winner" id="verdict-winner"></span>
        <span id="verdict-text"></span>
      </div>
    </div>

    <!-- TABS -->
    <div class="tabs">
      <div class="tab-btn active" onclick="switchAnalysisTab('overview')">Обзор</div>
      <div class="tab-btn" onclick="switchAnalysisTab('maps')">🗺 Карты</div>
    </div>

    <div class="analysis-body" id="analysis-tabs-body">
      <!-- OVERVIEW TAB -->
      <div class="tab-content active" id="tab-overview">
        <!-- Stats comparison -->
        <div style="padding:12px 16px 0">
          <div class="stats-card" id="stats-comparison"></div>
        </div>
        <!-- H2H -->
        <div style="padding:12px 16px 0">
          <div class="stats-card" id="h2h-block"></div>
        </div>
        <!-- Key factors -->
        <div style="padding:12px 16px 0" id="factors-block"></div>
        <!-- Summary -->
        <div id="summary-block"></div>
        <div style="height:16px"></div>
      </div>

      <!-- MAPS TAB -->
      <div class="tab-content" id="tab-maps">
        <div style="padding:12px 16px 0" id="maps-analysis-block"></div>
        <div style="height:16px"></div>
      </div>
    </div>
  </div>
</div>

<script>
// ── TELEGRAM WEBAPP INIT ──────────────────────────────────────────
const tg = window.Telegram?.WebApp;
if (tg) {
  tg.ready();
  tg.expand();
  tg.setHeaderColor('#161b22');
  tg.setBackgroundColor('#0d1117');
}

const userId = tg?.initDataUnsafe?.user?.id || 0;
const userName = tg?.initDataUnsafe?.user?.first_name || 'Пользователь';
const userHandle = tg?.initDataUnsafe?.user?.username || '';

// ── STATE ─────────────────────────────────────────────────────────
let matches = [];
let currentTab = 'matches';
let subStatus = null;
let analysisData = null;

// ── INIT ─────────────────────────────────────────────────────────
async function init() {
  loadProfile();
  checkSub();
  loadMatches();
}

// ── SUBSCRIPTION ──────────────────────────────────────────────────
async function checkSub() {
  if (!userId) {
    renderSubStatus({ active: false });
    return;
  }
  try {
    const r = await fetch(`/api/subscription/${userId}`);
    subStatus = await r.json();
    const badge = document.getElementById('sub-badge');
    if (subStatus.active) {
      badge.className = 'header-badge badge-active';
      badge.textContent = subStatus.expires === '∞' ? '👑 Админ' : `✅ до ${subStatus.expires}`;
    } else {
      badge.className = 'header-badge badge-inactive';
      badge.textContent = '🔒 Нет доступа';
    }
    renderSubStatus(subStatus);
  } catch(e) {
    renderSubStatus({ active: false });
  }
}

function renderSubStatus(s) {
  const el = document.getElementById('sub-status-block');
  if (s.active) {
    const isAdmin = s.expires === '∞';
    el.innerHTML = `
      <div class="sub-icon">${isAdmin ? '👑' : '✅'}</div>
      <div class="sub-title">${isAdmin ? 'Администратор' : 'Подписка активна'}</div>
      ${isAdmin ? '' : `<div class="sub-days">${s.days_left}</div><div class="sub-expires">дней до ${s.expires}</div>`}
    `;
  } else {
    el.innerHTML = `
      <div class="sub-icon">🔒</div>
      <div class="sub-title">Подписка не активна</div>
      <div class="sub-desc">Введи код доступа ниже<br>чтобы получить доступ к боту</div>
    `;
  }
}

async function activateCode() {
  const code = document.getElementById('code-input').value.trim().toUpperCase();
  if (!code) { showToast('Введи код', 'error'); return; }
  if (!userId) { showToast('Открой через Telegram', 'error'); return; }

  const btn = document.getElementById('btn-activate');
  btn.disabled = true;
  btn.textContent = 'Активация...';

  try {
    const r = await fetch('/api/activate', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ user_id: userId, code })
    });
    const data = await r.json();
    if (data.success) {
      showToast(data.message, 'success');
      document.getElementById('code-input').value = '';
      await checkSub();
    } else {
      showToast(data.message, 'error');
    }
  } catch(e) {
    showToast('Ошибка соединения', 'error');
  }
  btn.disabled = false;
  btn.textContent = 'Активировать';
}

// ── PROFILE ───────────────────────────────────────────────────────
function loadProfile() {
  const av = document.getElementById('profile-avatar');
  av.textContent = userName.charAt(0).toUpperCase();
  document.getElementById('profile-name').textContent = userName;
  document.getElementById('profile-id').textContent = `ID: ${userId || '—'}${userHandle ? ' · @'+userHandle : ''}`;
}

// ── MATCHES ───────────────────────────────────────────────────────
async function loadMatches() {
  try {
    const r = await fetch('/api/matches');
    if (!r.ok) throw new Error(r.statusText);
    matches = await r.json();
    renderMatches();
  } catch(e) {
    document.getElementById('matches-loader').innerHTML = `
      <div class="empty-state">
        <div class="empty-icon">⚠️</div>
        <div>Ошибка загрузки матчей</div>
        <div style="font-size:12px;color:var(--sub);margin-top:6px">${e.message}</div>
      </div>`;
  }
}

function renderMatches() {
  const loader = document.getElementById('matches-loader');
  const list = document.getElementById('matches-list');
  loader.style.display = 'none';
  list.style.display = 'block';

  if (!matches.length) {
    list.innerHTML = `<div class="empty-state"><div class="empty-icon">📅</div><div>Матчей не найдено</div><div style="font-size:12px;color:var(--sub);margin-top:6px">Проверь позже</div></div>`;
    return;
  }

  const live = matches.filter(m => m.live);
  const upcoming = matches.filter(m => !m.live);

  let html = '';
  if (live.length) {
    html += `<div class="section-header">🔴 LIVE</div>`;
    live.forEach(m => { html += matchCard(m); });
  }
  if (upcoming.length) {
    html += `<div class="section-header">📅 Предстоящие</div>`;
    upcoming.forEach(m => { html += matchCard(m); });
  }
  list.innerHTML = html;
}

function matchCard(m) {
  const stars = m.stars > 0 ? '⭐'.repeat(Math.min(m.stars, 3)) : '';
  const cls = m.live ? 'match-card match-card-live' : (m.stars >= 3 ? 'match-card match-card-hot' : 'match-card');
  return `
  <div class="${cls}" onclick="openAnalysis(${m.idx})">
    <div class="match-meta">
      ${m.live ? '<span class="match-live">LIVE</span>' : `<span class="match-time">${m.time}</span>`}
      ${m.maps ? `<span class="match-format">${m.maps}</span>` : ''}
      ${stars ? `<span class="match-stars">${stars}</span>` : ''}
      <span class="match-event">${m.event}</span>
    </div>
    <div class="match-teams">
      <div class="team-name">${esc(m.team1)}</div>
      <div class="vs-badge">VS</div>
      <div class="team-name right">${esc(m.team2)}</div>
    </div>
  </div>`;
}

// ── ANALYSIS ──────────────────────────────────────────────────────
async function openAnalysis(idx) {
  if (!subStatus?.active) {
    showToast('Нужна подписка 🔒', 'error');
    switchTab('profile');
    return;
  }

  const m = matches[idx];
  if (!m) return;

  // Show overlay
  const overlay = document.getElementById('analysis-overlay');
  overlay.classList.add('open');
  document.getElementById('analysis-loader').style.display = 'block';
  document.getElementById('analysis-content').style.display = 'none';

  // Set header
  document.getElementById('a-t1-name').textContent = m.team1;
  document.getElementById('a-t2-name').textContent = m.team2;
  document.getElementById('a-event').textContent = m.event;
  document.getElementById('a-t1-sub').textContent = '';
  document.getElementById('a-t2-sub').textContent = '';

  if (tg?.BackButton) {
    tg.BackButton.show();
    tg.BackButton.onClick(closeAnalysis);
  }

  try {
    const r = await fetch(`/api/analysis/${idx}`);
    if (!r.ok) throw new Error(await r.text());
    analysisData = await r.json();
    renderAnalysis(analysisData);
  } catch(e) {
    document.getElementById('analysis-loader').innerHTML = `
      <div class="empty-state" style="padding-top:80px">
        <div class="empty-icon">❌</div>
        <div>Ошибка анализа</div>
        <div style="font-size:12px;color:var(--sub);margin-top:6px">${e.message}</div>
      </div>`;
  }
}

function closeAnalysis() {
  document.getElementById('analysis-overlay').classList.remove('open');
  if (tg?.BackButton) tg.BackButton.hide();
  switchAnalysisTab('overview');
}

function renderAnalysis(d) {
  document.getElementById('analysis-loader').style.display = 'none';
  document.getElementById('analysis-content').style.display = 'flex';

  // Win bars
  document.getElementById('win-t1-name').textContent = d.team1;
  document.getElementById('win-t2-name').textContent = d.team2;
  document.getElementById('win-p1').textContent = `${Math.round(d.p1)}%`;
  document.getElementById('win-p2').textContent = `${Math.round(d.p2)}%`;
  document.getElementById('win-bar').style.width = `${d.p1}%`;

  // Verdict
  if (d.verdict) {
    const vBox = document.getElementById('verdict-box');
    const winner = d.p1 >= d.p2 ? d.team1 : d.team2;
    document.getElementById('verdict-winner').textContent = winner + ' — ';
    document.getElementById('verdict-text').textContent = d.verdict;
    vBox.style.display = 'block';
  }

  // Stats comparison
  const s1 = d.team1_stats, s2 = d.team2_stats;
  const fmtWr = v => v != null ? `${v.toFixed(1)}%` : '—';
  const fmtRd = v => v != null ? (v > 0 ? '+' : '') + v.toFixed(1) : '—';
  document.getElementById('stats-comparison').innerHTML = `
    <div class="stats-card-header">📊 Статистика команд</div>
    ${statRow('Взвешенная форма (7м)', fmtWr(s1.weighted_winrate), fmtWr(s2.weighted_winrate), s1.weighted_winrate, s2.weighted_winrate, d.team1, d.team2)}
    ${statRow('Winrate (20м)', fmtWr(s1.winrate), fmtWr(s2.winrate), s1.winrate, s2.winrate, d.team1, d.team2)}
    ${statRow('Форма', s1.form||'—', s2.form||'—', null, null, '', '')}
    ${statRow('Avg ±раундов', fmtRd(s1.avg_round_diff), fmtRd(s2.avg_round_diff), s1.avg_round_diff, s2.avg_round_diff, d.team1, d.team2)}
  `;

  // H2H
  const h2h = d.h2h;
  let h2hHtml = '<div class="stats-card-header">🤝 Личные встречи (H2H)</div>';
  if (h2h && h2h.total > 0) {
    h2hHtml += `<div class="h2h-row">
      <div class="h2h-item"><div class="h2h-wins" style="color:var(--blue)">${h2h.team1_wins}</div><div class="h2h-team">${d.team1}</div></div>
      <div style="font-size:13px;color:var(--sub)">из ${h2h.total}</div>
      <div class="h2h-item"><div class="h2h-wins" style="color:var(--accent)">${h2h.team2_wins}</div><div class="h2h-team">${d.team2}</div></div>
    </div>`;
    if (h2h.last_matches?.length) {
      h2hHtml += '<div class="h2h-matches">';
      h2h.last_matches.forEach(lm => {
        h2hHtml += `<div class="h2h-match"><span style="color:var(--sub)">${lm.date} ${lm.format}</span><span class="h2h-winner">🏆 ${esc(lm.winner)}</span></div>`;
      });
      h2hHtml += '</div>';
    }
  } else {
    h2hHtml += '<div style="padding:14px;color:var(--sub);font-size:13px;text-align:center">Данных о встречах нет</div>';
  }
  document.getElementById('h2h-block').innerHTML = h2hHtml;

  // Key factors — здесь объясняется ПОЧЕМУ у команды лучше форма и т.д.
  const fb = document.getElementById('factors-block');
  if (d.key_factors?.length) {
    fb.innerHTML = `<div class="section-header">🔑 Ключевые факторы</div>` +
      d.key_factors.map(f => `<div class="factor-item"><span class="factor-bullet">›</span><span>${esc(f)}</span></div>`).join('');
    fb.style.display = 'block';
  } else { fb.style.display = 'none'; }

  // Map-by-map analysis
  renderMapsAnalysis(d.maps_analysis, d.team1, d.team2);

  // Summary
  const sb = document.getElementById('summary-block');
  if (d.summary) {
    sb.innerHTML = `<div class="summary-box">${esc(d.summary)}</div>`;
    sb.style.display = 'block';
  } else { sb.style.display = 'none'; }
}

function renderMapsAnalysis(maps, team1, team2) {
  const el = document.getElementById('maps-analysis-block');
  if (!maps || !maps.length) {
    el.innerHTML = `<div class="empty-state"><div class="empty-icon">🗺</div><div>Нет данных по картам</div></div>`;
    return;
  }

  const favoredColor = (favored) => {
    if (favored === team1) return 'var(--blue)';
    if (favored === team2) return 'var(--accent)';
    return 'var(--sub)';
  };
  const favoredCls = (favored) => {
    if (favored === team1) return 'green';
    if (favored === team2) return 'red';
    return 'gray';
  };

  el.innerHTML = `<div class="section-header">🗺 Карты</div>` +
    maps.map(m => `
      <div class="map-item ${favoredCls(m.favored)}">
        <div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:3px">
          <span style="font-weight:700;font-size:13px">${esc(m.map)}</span>
          <span style="font-size:11px;font-weight:700;color:${favoredColor(m.favored)}">${esc(m.favored || 'равно')}</span>
        </div>
        <div style="color:var(--sub);font-size:12px;line-height:1.4">${esc(m.reason || '')}</div>
      </div>
    `).join('');
}

function statRow(label, v1, v2, n1, n2, t1, t2) {
  let cls1 = '', cls2 = '';
  if (n1 != null && n2 != null && n1 !== n2) {
    cls1 = n1 > n2 ? 'good' : 'bad';
    cls2 = n2 > n1 ? 'good' : 'bad';
  }
  return `<div class="stats-row">
    <span class="stats-value ${cls1}">${v1}</span>
    <span class="stats-label">${label}</span>
    <span class="stats-value ${cls2}">${v2}</span>
  </div>`;
}

// ── TOP TEAMS ─────────────────────────────────────────────────────
async function loadTopTeams() {
  const loader = document.getElementById('top-loader');
  const list = document.getElementById('teams-list');
  loader.style.display = 'flex';
  list.style.display = 'none';
  try {
    const r = await fetch('/api/top-teams');
    const teams = await r.json();
    loader.style.display = 'none';
    list.style.display = 'block';
    const medals = ['🥇','🥈','🥉'];
    list.innerHTML = `<div class="section-header">Рейтинг HLTV • Июнь 2026</div>` +
      teams.map((t, i) => `
        <div class="team-row">
          <div class="team-rank ${i<3?`rank-medal-${i+1}`:''}">
            ${i < 3 ? medals[i] : `#${t.rank}`}
          </div>
          <div class="team-flag">${t.flag || '🔹'}</div>
          <div class="team-info"><div class="team-row-name">${esc(t.name)}</div></div>
        </div>`).join('');
  } catch(e) {
    loader.innerHTML = `<div class="empty-state"><div class="empty-icon">⚠️</div><div>Ошибка загрузки</div></div>`;
  }
}

// ── NAVIGATION ────────────────────────────────────────────────────
function switchTab(tab) {
  ['matches','top','profile'].forEach(t => {
    document.getElementById(`screen-${t}`).classList.toggle('active', t === tab);
    document.getElementById(`nav-${t}`).classList.toggle('active', t === tab);
  });
  currentTab = tab;
  if (tab === 'top' && document.getElementById('teams-list').style.display === 'none') {
    loadTopTeams();
  }
}

// ── UTILS ─────────────────────────────────────────────────────────
function switchAnalysisTab(tab) {
  ['overview','maps'].forEach(t => {
    document.getElementById(`tab-${t}`).classList.toggle('active', t === tab);
  });
  document.querySelectorAll('.tabs .tab-btn').forEach((btn, i) => {
    btn.classList.toggle('active', ['overview','maps'][i] === tab);
  });
  document.getElementById('analysis-tabs-body').scrollTop = 0;
}

function esc(str) {
  return String(str || '').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');
}

function showToast(msg, type='') {
  const t = document.createElement('div');
  t.className = 'toast ' + type;
  t.textContent = msg;
  document.body.appendChild(t);
  setTimeout(() => t.remove(), 2800);
}

// ── START ─────────────────────────────────────────────────────────
init();
</script>
</body>
</html>
